<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$if(title)$$title$$else$Document$endif$</title>
$for(css)$
  <link rel="stylesheet" href="$css$" />
$endfor$
$for(header-includes)$
  $header-includes$
$endfor$
</head>
<body>
$if(logo)$
<table class="print-wrapper">
  <thead>
    <tr><td class="header-cell">
      <div class="doc-header">
        <span class="confidential">Strictly Confidential and for Internal Purpose Only</span>
        <img src="$logo$" alt="Wavebridge" />
      </div>
    </td></tr>
  </thead>
  <tbody>
    <tr><td class="body-cell">
$endif$

$if(title)$
<h1 class="title">$title$</h1>
$if(subtitle)$
<h2 class="subtitle">$subtitle$</h2>
$endif$
$if(date)$
<p class="date">$date$</p>
$endif$
$endif$
$body$

$if(logo)$
    </td></tr>
  </tbody>
</table>
$endif$
</body>
</html>
